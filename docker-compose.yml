name: stoxx

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: stoxx-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./docker/db-entrypoint.sh:/entrypoint.sh
      - ./docker/db-init.sh:/docker-entrypoint-initdb.d/db-init.sh
      - ./db/ddl/bronze_schema.sql:/docker-entrypoint-initdb.d/bronze_schema.sql
      - ./db/ddl/silver_schema.sql:/docker-entrypoint-initdb.d/silver_schema.sql
      - ./db/ddl/gold_schema.sql:/docker-entrypoint-initdb.d/gold_schema.sql
    entrypoint: /bin/bash /entrypoint.sh
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  pipeline:
    build:
      context: .
      dockerfile: docker/pipeline.Dockerfile
    container_name: stoxx-pipeline
    environment:
      SQL_HOST: db
      SQL_PORT: "1433"
      SQL_DATABASE: ${SQL_DATABASE:-stoxx}
      SQL_USER: ${SQL_USER:-sa}
      SA_PASSWORD: ${SA_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pipeline_data:/app/data
      - pipeline_logs:/app/logs

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    container_name: stoxx-dashboard
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__stoxx: "Server=db,1433;Database=${SQL_DATABASE:-stoxx};User Id=${SQL_USER:-sa};Password=${SA_PASSWORD};TrustServerCertificate=true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  sqlserver_data:
  pipeline_data:
  pipeline_logs:
