# Build & deploy Blazor dashboard to Cloud Run on push to dashboard/** paths.
name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "docker/dashboard.Dockerfile"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:
  workflow_call:

env:
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev/stoxx-index-intelligence/stoxx

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dashboard.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/dashboard:${{ github.sha }}
            ${{ env.REGISTRY }}/dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.34.2
        with:
          version: 'v0.69.3'
          image-ref: ${{ env.REGISTRY }}/dashboard:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update stoxx-dashboard \
            --image=$REGISTRY/dashboard:${{ github.sha }} \
            --region=$REGION
