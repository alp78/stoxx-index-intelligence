name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "docker/dashboard.Dockerfile"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:
  workflow_call:

env:
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev/stoxx-index-intelligence/stoxx

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build & push dashboard image
        run: |
          docker build --provenance=false \
            -t $REGISTRY/dashboard:${{ github.sha }} \
            -t $REGISTRY/dashboard:latest \
            -f docker/dashboard.Dockerfile .
          docker push $REGISTRY/dashboard --all-tags

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update stoxx-dashboard \
            --image=$REGISTRY/dashboard:${{ github.sha }} \
            --region=$REGION
