# Build & deploy Python pipeline to Cloud Run Job on push to ingestion/utils/db paths.
name: Deploy Pipeline

on:
  push:
    branches: [main]
    paths:
      - "ingestion/**"
      - "utils/**"
      - "db/**"
      - "docker/pipeline.Dockerfile"
      - ".github/workflows/deploy-pipeline.yml"
  workflow_dispatch:
  workflow_call:

env:
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev/stoxx-index-intelligence/stoxx

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push pipeline image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/pipeline.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/pipeline:${{ github.sha }}
            ${{ env.REGISTRY }}/pipeline:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.34.2
        with:
          version: 'v0.69.2'
          image-ref: ${{ env.REGISTRY }}/pipeline:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Update pipeline job
        run: |
          gcloud run jobs update stoxx-pipeline \
            --image=$REGISTRY/pipeline:${{ github.sha }} \
            --region=$REGION

      - name: Update setup job
        run: |
          gcloud run jobs update stoxx-setup \
            --image=$REGISTRY/pipeline:${{ github.sha }} \
            --region=$REGION
